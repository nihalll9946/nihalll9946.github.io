<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nihal | malayalam typer </title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- AOS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#020617;color:#fff;overflow-x:hidden}

/* PRELOADER */
#preloader{
position:fixed;
width:100%;
height:100%;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
transition:1s;
}
#preloader h1{
font-size:5rem;
color:#00f5ff;
animation:spin 1.5s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg)}}

/* WEBGL CANVAS */
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-3;
}

/* NAV */
nav{
position:fixed;
width:100%;
padding:1rem 2rem;
display:flex;
justify-content:space-between;
align-items:center;
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(0,255,255,0.4);
z-index:1000;
}
nav h2{color:#00f5ff}

/* HERO */
.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}
.hero video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(0.4);
}
.hero h1{
font-size:3rem;
}
.hero span{color:#00f5ff}

/* STATS */
.stats{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:2rem;
padding:4rem 2rem;
}
.stat{
backdrop-filter:blur(20px);
border:1px solid rgba(0,255,255,0.4);
padding:2rem;
border-radius:20px;
min-width:200px;
text-align:center;
}
.stat h2{color:#00f5ff;font-size:2rem}

/* PARALLAX */
.parallax{
height:80vh;
background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover fixed;
display:flex;
align-items:center;
justify-content:center;
font-size:2rem;
}

/* BENTO GRID */
.projects{padding:4rem 2rem}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:2rem;
}
.card{
padding:2rem;
border-radius:20px;
backdrop-filter:blur(20px);
border:1px solid rgba(0,255,255,0.4);
transition:.3s;
}
.card:hover{transform:scale(1.05)}
.card h3{color:#00f5ff}

/* FOOTER */
footer{
padding:3rem;
text-align:center;
backdrop-filter:blur(20px);
border-top:1px solid rgba(0,255,255,0.4);
}
footer a{
margin:0 1rem;
font-size:2rem;
color:#fff;
transition:.3s;
}
footer a:hover{
color:#00f5ff;
transform:scale(1.2);
}

/* MOUSE ORB */
#cursor{
position:fixed;
width:20px;
height:20px;
background:#00f5ff;
border-radius:50%;
pointer-events:none;
box-shadow:0 0 20px #00f5ff;
z-index:999;
}
</style>
</head>
<body>

<div id="preloader"><h1>N</h1></div>
<canvas id="bg"></canvas>
<div id="cursor"></div>

<nav><h2>Nihal</h2></nav>

<section class="hero">
<video autoplay muted loop playsinline>
<source src="https://cdn.coverr.co/videos/coverr-clouds-above-the-sea-1584/1080p.mp4" type="video/mp4">
</video>
<h1><span id="typed"></span></h1>
</section>

<section class="stats" data-aos="fade-up">
<div class="stat"><h2 class="counter" data-target="10">0</h2><p>Million Views</p></div>
<div class="stat"><h2 class="counter" data-target="200">0</h2><p>K Followers</p></div>
<div class="stat"><h2 class="counter" data-target="95">0</h2><p>% Retention</p></div>
</section>

<section class="parallax" data-aos="zoom-in">
Cinematic Malayalam Reels
</section>

<section class="projects" data-aos="flip-left">
<div class="grid">
<div class="card" data-tilt><h3>Reels Editing</h3><p>High impact transitions.</p></div>
<div class="card" data-tilt><h3>Brand Collaborations</h3><p>Visual storytelling.</p></div>
<div class="card" data-tilt><h3>Creative Campaigns</h3><p>Engagement focused.</p></div>
<div class="card" data-tilt><h3>Culture Content</h3><p>Malayalam native vibes.</p></div>
</div>
</section>

<footer>
<a href="https://www.instagram.com/_.niha.l___" target="_blank"><i class="fab fa-instagram"></i></a>
<a href="https://www.youtube.com/@nihal_creation99" target="_blank"><i class="fab fa-youtube"></i></a>
<a href="mailto:nihalll9946@gmail.com"><i class="fas fa-envelope"></i></a>
</footer>

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.12/typed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>

<script>
/* AOS */
AOS.init({duration:1200});

/* Typed */
new Typed('#typed',{
strings:["I'm Nihal","Malayalam Content Creater","Visual storyteller"],
typeSpeed:50,
backSpeed:30,
loop:true
});

/* Preloader */
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("preloader").style.opacity="0";
},1500);
});

/* Counter */
const counters=document.querySelectorAll('.counter');
counters.forEach(counter=>{
const update=()=>{
const target=+counter.getAttribute('data-target');
const count=+counter.innerText;
const inc=target/100;
if(count<target){
counter.innerText=Math.ceil(count+inc);
setTimeout(update,20);
}else{counter.innerText=target;}
}
update();
});

/* Mouse Orb */
const cursor=document.getElementById("cursor");
let mouseX=0,mouseY=0,posX=0,posY=0;
document.addEventListener("mousemove",(e)=>{
mouseX=e.clientX;mouseY=e.clientY;
});
function animate(){
posX+=(mouseX-posX)/6;
posY+=(mouseY-posY)/6;
cursor.style.left=posX+"px";
cursor.style.top=posY+"px";
requestAnimationFrame(animate);
}
animate();

/* Tilt */
VanillaTilt.init(document.querySelectorAll("[data-tilt]"));

/* Three.js Galaxy */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
camera.position.z=5;

const particles=new THREE.BufferGeometry();
const count=5000;
const positions=new Float32Array(count*3);
for(let i=0;i<count*3;i++){
positions[i]=(Math.random()-0.5)*20;
}
particles.setAttribute('position',new THREE.BufferAttribute(positions,3));
const material=new THREE.PointsMaterial({color:0x00f5ff,size:0.02});
const mesh=new THREE.Points(particles,material);
scene.add(mesh);

function animateGalaxy(){
requestAnimationFrame(animateGalaxy);
mesh.rotation.y+=0.0005;
renderer.render(scene,camera);
}
animateGalaxy();
</script>

</body>
</html>
